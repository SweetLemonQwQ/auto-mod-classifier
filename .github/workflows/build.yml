name: Build and Release EXE

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Extract version from version info
        id: version
        run: |
          $content = Get-Content "pyinstaller_version_info.txt" -Raw
          if ($content -match '"FileVersion",\s*"([^"]+)"') {
            $ver = $matches[1]
          } elseif ($content -match 'filevers=\((\d+),\s*(\d+),\s*(\d+),\s*(\d+)\)') {
            $ver = "$($matches[1]).$($matches[2]).$($matches[3])"
          } else {
            $ver = "0.0.0"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Detected version: $ver"
      
      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean --noconsole --onefile --hidden-import=DrissionPage --exclude-module=cv2 --exclude-module=PIL --exclude-module=numpy --exclude-module=openpyxl --exclude-module=cloudscraper --exclude-module=curl_cffi --name "auto-mod-classifier-${{ steps.version.outputs.VERSION }}" --icon "自动筛选模组分类器.ico" --version-file "pyinstaller_version_info.txt" "自动筛选模组分类器.pyw"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-mod-classifier-exe
          path: dist/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            Automated build from commit ${{ github.sha }}
            
            ## 下载
            - `auto-mod-classifier-${{ steps.version.outputs.VERSION }}.exe` - 主程序
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}